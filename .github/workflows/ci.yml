# Central knobs: bump matrix to add JDK 21+, set MAVEN_ARGS for multi-module (-pl …).
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MAVEN_ARGS: ""

jobs:
  # Fast security gate — no JDK; full git history only for Gitleaks.
  secrets-scan:
    name: Secret scanning (Gitleaks + Trivy fs)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks (committed secrets)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy filesystem — secret scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: secret
          severity: CRITICAL,HIGH
          exit-code: "1"
          hide-progress: "true"
          skip-files: "src/main/resources/application.yml,src/test/resources/application-test.yml,docker-compose.yml"

  # Scale: add 21 to matrix.java-version when the project targets Java 21.
  maven-verify:
    name: Build & quality
    needs: secrets-scan
    strategy:
      fail-fast: false
      matrix:
        java-version: ["17"]
    uses: ./.github/workflows/reusable-maven-verify.yml
    with:
      java-version: ${{ matrix.java-version }}
      java-distribution: temurin
      maven-args: ${{ env.MAVEN_ARGS }}

  container-scan:
    name: Docker image vulnerabilities
    runs-on: ubuntu-latest
    needs: maven-verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t bank-management:ci .

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: bank-management:ci
          format: table
          severity: CRITICAL,HIGH
          exit-code: "0"
          hide-progress: "true"
